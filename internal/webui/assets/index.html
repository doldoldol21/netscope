<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>netscope</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="panel.css" />
</head>
<body>
<div class="panel">
  <header class="drag">
    <img class="logo" src="favicon.svg" alt="" />
    <span class="brand">netscope</span>
    <span class="spacer"></span>
    <span class="dot" id="dot"></span>
    <span class="meta" id="meta">connecting…</span>
  </header>

  <button class="updbanner" id="updbanner" hidden>
    <span class="ub-txt">Update available</span>
    <span class="ub-go">Update ↻</span>
  </button>

  <section class="rates">
    <div class="rate down">
      <div class="line"><span class="arrow">▼</span><span class="v" id="rx">0</span></div>
      <div class="lbl">download</div>
    </div>
    <div class="rate up">
      <div class="line"><span class="arrow">▲</span><span class="v" id="tx">0</span></div>
      <div class="lbl">upload</div>
    </div>
  </section>

  <div class="today">
    <span class="t-cap">Today</span>
    <span class="t-total" id="t-total">—</span>
    <span class="t-split" id="t-split"></span>
  </div>

  <canvas id="spark"></canvas>

  <div class="section-head">
    <span>Top apps</span><span class="hint" id="active"></span>
  </div>
  <ul class="apps" id="apps"></ul>

  <footer>
    <button class="primary" id="dash">Open Dashboard <span class="ext">↗</span></button>
    <button class="ghost" id="alerts-btn" title="Usage alerts">⚙</button>
    <button class="ghost" id="quit" title="Quit netscope">⏻</button>
  </footer>

  <div class="settings" id="settings" hidden>
    <div class="set-head">
      <span>Settings</span>
      <button class="x" id="set-close" title="Close">✕</button>
    </div>

    <div class="set-sub">Usage alerts</div>
    <p class="set-hint">Notify me when today's traffic crosses a limit. Leave 0 to turn off.</p>
    <label class="set-row">
      <span class="set-lbl">Daily total</span>
      <span class="set-inp"><input type="number" id="set-daily" min="0" step="0.5" placeholder="0" /><em>GB</em></span>
    </label>
    <label class="set-row">
      <span class="set-lbl">Any one app</span>
      <span class="set-inp"><input type="number" id="set-app" min="0" step="0.5" placeholder="0" /><em>GB</em></span>
    </label>

    <div class="set-sub">Menu bar</div>
    <label class="set-row">
      <span class="set-lbl">Rate display</span>
      <select id="set-menubar" class="set-sel"></select>
    </label>

    <div class="set-sub">Updates</div>
    <label class="set-row">
      <span class="set-lbl">Check automatically</span>
      <input type="checkbox" id="set-autocheck" class="set-chk" />
    </label>
    <div class="set-row">
      <span class="set-lbl upd-status" id="upd-status">—</span>
      <button class="mini" id="upd-check">Check now</button>
    </div>
    <button class="primary upd-now" id="upd-now" hidden>Update &amp; Restart</button>

    <button class="primary" id="set-save">Save</button>
  </div>
</div>
<script src="panel.js"></script>
</body>
</html>
