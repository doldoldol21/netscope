<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>netscope</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="panel.css" />
</head>
<body>
<div class="panel">
  <header class="drag">
    <img class="logo" src="favicon.svg" alt="" />
    <span class="brand">netscope</span>
    <span class="spacer"></span>
    <span class="dot" id="dot"></span>
    <button class="meta" id="meta" aria-label="Capture interface"
            data-tip="Capture interface" data-tip-down>connecting…</button>
    <button class="iconbtn" id="pause-btn" aria-label="Pause capture"
            data-tip="Pause capture" data-tip-down>⏸</button>
  </header>
  <div class="iface-menu" id="iface-menu" hidden></div>

  <button class="updbanner" id="updbanner" hidden>
    <span class="ub-txt">Update available</span>
    <span class="ub-go">Update ↻</span>
  </button>

  <section class="rates">
    <div class="rate down">
      <div class="line"><span class="arrow">▼</span><span class="v" id="rx">0</span></div>
      <div class="lbl">download</div>
    </div>
    <div class="rate up">
      <div class="line"><span class="arrow">▲</span><span class="v" id="tx">0</span></div>
      <div class="lbl">upload</div>
    </div>
  </section>

  <div class="today">
    <span class="t-cap">Today</span>
    <span class="t-total" id="t-total">—</span>
    <span class="t-split" id="t-split"></span>
  </div>

  <canvas id="spark"></canvas>

  <div class="section-head">
    <span>Top apps</span><span class="hint" id="active"></span>
  </div>
  <ul class="apps" id="apps"></ul>

  <footer>
    <button class="primary" id="dash" aria-label="Open Dashboard">Open Dashboard <span class="ext">↗</span></button>
    <button class="ghost" id="alerts-btn" aria-label="Settings"
            data-tip="Settings">⚙</button>
    <button class="ghost" id="quit" aria-label="Quit netscope"
            data-tip="Quit">⏻</button>
  </footer>

  <div class="settings" id="settings">
    <div class="set-head">
      <span>Settings</span>
      <button class="x" id="set-close" title="Close">✕</button>
    </div>

    <div class="set-body">
      <div class="set-sub">Alerts</div>
      <p class="set-hint">Notify when today's usage crosses a daily limit, in GB. 0 = off.
        Upload-only watches data leaving your Mac (backups, cloud sync).</p>
      <div class="alert-grid">
        <span></span>
        <span class="ag-head">↓↑ Total<small>GB</small></span>
        <span class="ag-head up">↑ Upload<small>GB</small></span>

        <span class="set-lbl">All apps</span>
        <input type="number" id="set-daily" min="0" step="0.5" placeholder="0" />
        <input type="number" id="set-up-daily" min="0" step="0.5" placeholder="0" />

        <span class="set-lbl">One app</span>
        <input type="number" id="set-app" min="0" step="0.5" placeholder="0" />
        <input type="number" id="set-up-app" min="0" step="0.5" placeholder="0" />
      </div>

      <div class="set-sub">Appearance</div>
      <label class="set-row">
        <span class="set-lbl">Theme</span>
        <select id="set-theme" class="set-sel">
          <option value="auto">Follow system</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>

      <div class="set-sub">Menu bar</div>
      <label class="set-row">
        <span class="set-lbl">Rate display</span>
        <select id="set-menubar" class="set-sel"></select>
      </label>
      <label class="set-row">
        <span class="set-lbl">Color ↓ / ↑</span>
        <input type="checkbox" id="set-menubar-color" class="set-chk" />
      </label>
      <label class="set-row">
        <span class="set-lbl">Animate icon</span>
        <input type="checkbox" id="set-menubar-anim" class="set-chk" />
      </label>

      <div class="set-sub">Updates</div>
      <label class="set-row">
        <span class="set-lbl">Check automatically</span>
        <input type="checkbox" id="set-autocheck" class="set-chk" />
      </label>
      <div class="set-row">
        <span class="set-lbl upd-status" id="upd-status">—</span>
        <button class="mini" id="upd-check">Check now</button>
      </div>
      <button class="primary upd-now" id="upd-now" hidden>Update &amp; Restart</button>
    </div>
  </div>
</div>
<script src="tooltip.js"></script>
<script src="panel.js"></script>
</body>
</html>
