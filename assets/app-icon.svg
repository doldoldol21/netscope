<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4493f8"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- macOS rounded-rect (squircle-ish) background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- concentric network rings -->
  <circle cx="512" cy="512" r="332" fill="none" stroke="url(#g)" stroke-width="14" opacity="0.30"/>
  <circle cx="512" cy="512" r="216" fill="none" stroke="url(#g)" stroke-width="16" opacity="0.55"/>

  <!-- activity sparkline -->
  <path d="M150 560 L320 560 L398 360 L516 700 L596 480 L660 560 L874 560"
        fill="none" stroke="url(#g)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- center node -->
  <circle cx="512" cy="512" r="46" fill="#0d1117"/>
  <circle cx="512" cy="512" r="30" fill="#4493f8"/>
</svg>
