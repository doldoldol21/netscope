name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: netscope version
      description: From the dashboard footer, or `netscope --version` / the release tag.
      placeholder: v0.6.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.x (Apple Silicon / Intel)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: For capture/daemon issues, `/var/log/netscope.log` is helpful.
      render: shell
